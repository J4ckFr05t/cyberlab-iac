---
- name: Resolve Proxmox host from Terraform config
  hosts: localhost
  gather_facts: no
  vars:
    terraform_tfvars: "{{ playbook_dir }}/../../terraform/terraform.tfvars"
    lab_snapshot_name: "{{ lab_snapshot_name | default('freshClone') }}"
    proxmox_bulk_snapshot_script: "{{ proxmox_bulk_snapshot_script | default('/root/bulk_lab_snapshot.sh') }}"
  tasks:
    - name: Ensure terraform.tfvars exists
      stat:
        path: "{{ terraform_tfvars }}"
      register: tfvars_stat

    - name: Fail when terraform.tfvars is missing
      fail:
        msg: >-
          {{ terraform_tfvars }} not found.
          Configure proxmox_api_url in terraform/terraform.tfvars first.
      when: not tfvars_stat.stat.exists

    - name: Read terraform.tfvars
      slurp:
        src: "{{ terraform_tfvars }}"
      register: tfvars_raw

    - name: Parse proxmox_api_url from terraform.tfvars
      set_fact:
        proxmox_api_url: "{{ (tfvars_raw.content | b64decode) | regex_search('proxmox_api_url\\s*=\\s*\"([^\"]+)\"', '\\1') }}"

    - name: Fail when proxmox_api_url is missing
      fail:
        msg: proxmox_api_url is not set in terraform/terraform.tfvars
      when: proxmox_api_url | length == 0

    - name: Extract Proxmox host from API URL
      set_fact:
        proxmox_host: "{{ proxmox_api_url | regex_replace('^https?://([^:/]+).*', '\\1') }}"

    - name: Show Proxmox snapshot target
      debug:
        msg:
          - "Proxmox API URL: {{ proxmox_api_url }}"
          - "Proxmox host: {{ proxmox_host }}"
          - "Snapshot name: {{ lab_snapshot_name }}"
          - "Script: {{ proxmox_bulk_snapshot_script }}"

    - name: Register Proxmox host for snapshot
      add_host:
        name: proxmox
        groups: proxmox
        ansible_host: "{{ proxmox_host }}"
        ansible_user: "{{ proxmox_ssh_user | default('root') }}"
        ansible_password: "{{ proxmox_root_password | default(omit, true) }}"
        lab_snapshot_name: "{{ lab_snapshot_name }}"
        proxmox_bulk_snapshot_script: "{{ proxmox_bulk_snapshot_script }}"

- name: Bulk snapshot lab VMs on Proxmox
  hosts: proxmox
  gather_facts: no
  vars_files:
    - ../inventory/group_vars/secret_vault.yml
  vars:
    ansible_user: "{{ proxmox_ssh_user | default('root') }}"
    ansible_password: "{{ proxmox_root_password | default(omit, true) }}"
  tasks:
    - name: Verify bulk snapshot script exists
      stat:
        path: "{{ proxmox_bulk_snapshot_script }}"
      register: snapshot_script

    - name: Fail if bulk snapshot script is missing
      fail:
        msg: "{{ proxmox_bulk_snapshot_script }} not found on {{ inventory_hostname }}"
      when: not snapshot_script.stat.exists

    - name: Run bulk lab snapshot
      command: "{{ proxmox_bulk_snapshot_script }} {{ lab_snapshot_name | quote }}"
      register: snapshot_result
      changed_when: snapshot_result.rc == 0

    - name: Show snapshot output
      debug:
        var: snapshot_result.stdout_lines
